name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  actions: write

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and format
        run: npm run format-and-lint

      - name: Build
        run: npm run build

      - name: Report build artifacts
        run: node scripts/report-build-artifacts.mjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: apps/web/dist/
          if-no-files-found: error

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm run test-coverage
